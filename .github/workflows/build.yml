name: Build ASI Eklentisi

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Depoyu Cek
      uses: actions/checkout@v4

    - name: Plugin-SDK Indir
      shell: cmd
      run: |
        git clone --recursive https://github.com/DK22Pac/plugin-sdk.git C:\plugin-sdk

    - name: Prebuilt Libs Indir ve Yerlestir
      shell: cmd
      run: |
        mkdir C:\plugin-sdk\output\lib
        curl -L -o C:\plugin-sdk\output\lib\plugin.lib https://github.com/DK22Pac/plugin-sdk/raw/master/output/lib/plugin.lib || true
        curl -L -o C:\plugin-sdk\output\lib\plugin_sa.lib https://github.com/DK22Pac/plugin-sdk/raw/master/output/lib/plugin_sa.lib || true

    - name: Visual Studio C++ Ortamini Ayarla (x86)
      uses: ilammy/msvc-dev-cmd@v1
      with:
        arch: x86

    - name: FPS_Steer_Fix Projesini Olustur ve Derle
      shell: cmd
      run: |
        cmake -B build -A Win32 -DPLUGIN_SDK_DIR=C:/plugin-sdk
        cmake --build build --config Release

    - name: ASI Dosyasini Tasima
      shell: cmd
      run: |
        copy build\Release\*.asi FPS_Steer_Fix.asi || copy build\*.asi FPS_Steer_Fix.asi

    - name: ASI Dosyasini Yukle
      uses: actions/upload-artifact@v4
      with:
        name: FPS_Steer_Fix_ASI
        path: FPS_Steer_Fix.asi
