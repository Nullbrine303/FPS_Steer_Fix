name: Build ASI Eklentisi

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Depoyu Cek
      uses: actions/checkout@v4

    - name: Plugin-SDK Indir (Prebuilt Release)
      shell: cmd
      run: |
        curl -sL https://github.com/DK22Pac/plugin-sdk/releases/download/v1.0/plugin-sdk.zip -o C:\plugin-sdk.zip || curl -sL https://github.com/DK22Pac/plugin-sdk/archive/refs/heads/master.zip -o C:\plugin-sdk.zip
        powershell -Command "Expand-Archive -Path C:\plugin-sdk.zip -DestinationPath C:\plugin-sdk-temp"
        for /d %%i in (C:\plugin-sdk-temp\*) do move "%%i" C:\plugin-sdk

    - name: Visual Studio C++ Ortamini Ayarla (x86)
      uses: ilammy/msvc-dev-cmd@v1
      with:
        arch: x86

    - name: main.cpp Derleme (ASI Uretme)
      shell: cmd
      run: |
        cl.exe /O2 /LD /EHsc /std:c++latest /D "GTASA" /D "_CRT_SECURE_NO_WARNINGS" main.cpp /I C:\plugin-sdk\plugin_sa /I C:\plugin-sdk\plugin_common /I C:\plugin-sdk\shared /I C:\plugin-sdk\shared\game /I C:\plugin-sdk\injector /link /LIBPATH:C:\plugin-sdk\output\lib plugin.lib /OUT:FPS_Steer_Fix.asi || cl.exe /O2 /LD /EHsc /std:c++latest /D "GTASA" /D "_CRT_SECURE_NO_WARNINGS" main.cpp /I C:\plugin-sdk\plugin_sa /I C:\plugin-sdk\plugin_common /I C:\plugin-sdk\shared /I C:\plugin-sdk\shared\game /I C:\plugin-sdk\injector /OUT:FPS_Steer_Fix.asi

    - name: ASI Dosyasini Yukle
      uses: actions/upload-artifact@v4
      with:
        name: FPS_Steer_Fix_ASI
        path: FPS_Steer_Fix.asi
