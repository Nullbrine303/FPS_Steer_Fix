name: Build ASI Eklentisi

on:
  push:
    branches: [ "**" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Depoyu Cek
      uses: actions/checkout@v4

    # Plugin-SDK'yi Önbelleğe Al (Cache) - Tekrar derlemeleri 10 saniyeye düşürür
    - name: Plugin-SDK Cache Kontrolu
      id: cache-sdk
      uses: actions/cache@v4
      with:
        path: C:\plugin-sdk
        key: plugin-sdk-v143-v2

    - name: Plugin-SDK Indir (Eger Cache Yoksa)
      if: steps.cache-sdk.outputs.cache-hit != 'true'
      shell: cmd
      run: |
        git clone --recursive https://github.com/DK22Pac/plugin-sdk.git C:\plugin-sdk

    - name: Visual Studio C++ Ortamini Ayarla (x86)
      uses: ilammy/msvc-dev-cmd@v1
      with:
        arch: x86

    # MSBuild komutu doğru alt klasördeki (plugin_sa) vcxproj dosyasını hedefleyecek şekilde güncellendi
    - name: Plugin-SDK Kutuphanesini Derle (Sadece Ilk Seferde Calisir)
      if: steps.cache-sdk.outputs.cache-hit != 'true'
      shell: cmd
      run: |
        cd C:\plugin-sdk\plugin_sa
        msbuild plugin_sa.vcxproj /p:Configuration=Release /p:Platform=Win32 /p:PlatformToolset=v143

    - name: FPS_Steer_Fix Projesini Derle
      shell: cmd
      run: |
        cmake -B build -A Win32 -DPLUGIN_SDK_DIR=C:/plugin-sdk
        cmake --build build --config Release

    - name: ASI Dosyasini Yukle (Artifact)
      uses: actions/upload-artifact@v4
      with:
        name: FPS_Steer_Fix_ASI
        path: |
          build/Release/*.asi
          build/*.asi
        if-no-files-found: error
